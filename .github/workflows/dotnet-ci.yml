name: .NET CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore dependencies
        run: dotnet restore NameSorter.sln

      - name: Build solution
        run: dotnet build NameSorter.sln --configuration Release --no-restore

      - name: Publish build artifacts
        run: dotnet publish NameSorter.sln --configuration Release --output build_output

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: build_output

  test:
    runs-on: ubuntu-latest
    needs: build # 👈 important: test runs AFTER build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: build_output

      - name: Run tests
        run: dotnet test NameSorter.sln --configuration Release --no-build --verbosity normal
